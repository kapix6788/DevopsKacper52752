name: Main Branch Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install flake8 pytest redis flask
      - name: Lint
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test
        env:
          REDIS_HOST: localhost
        run: pytest

  # --- NOWA CZĘŚĆ (Wymaganie 4.5) ---
  deploy-image:
    # Uruchom tylko jeśli testy przeszły
    needs: test-and-lint
    # Wywołujemy nasz reusable workflow
    uses: ./.github/workflows/docker-publish.yml
    with:
      image_name: my-flask-app
    # Przekazujemy uprawnienia (ważne!)
    permissions:
      contents: read
      packages: write