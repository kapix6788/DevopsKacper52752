name: Pull Request Pipeline

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install flake8 pytest
      - name: Quick Test
        run: pytest