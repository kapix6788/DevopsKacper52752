name: Reusable Docker Build

# To sprawia, że workflow jest "reusable" - można go wołać z innych plików
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Kluczowe: pozwolenie na wysyłanie paczek do GitHuba

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Konwertujemy nazwę repozytorium na małe litery (wymóg Dockera)
      - name: Lowercase repo name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Obraz będzie dostępny jako: ghcr.io/twoj-login/nazwa-obrazu:latest
          tags: ghcr.io/${{ env.REPO }}/${{ inputs.image_name }}:latest