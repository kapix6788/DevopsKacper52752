name: CI Pipeline

# Kiedy ten pipeline ma ruszyć?
# Uruchomi się przy każdym pushu do gałęzi main (lub master) oraz przy Pull Requestach
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-lint:
    # Używamy maszyny wirtualnej Ubuntu (standard w GitHub Actions)
    runs-on: ubuntu-latest

    steps:
      # Krok 1: Pobierz kod z repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # Krok 2: Zainstaluj Pythona
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Krok 3: Zainstaluj zależności
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Krok 4: Sprawdź jakość kodu (Lint) - wymagane na ocenę 3.0
      # Ignorujemy błąd E501 (zbyt długa linia), żeby nie było zbyt restrykcyjnie na start
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Krok 5: Uruchom testy jednostkowe - wymagane na ocenę 3.0
      - name: Test with pytest
        run: |
          pytest